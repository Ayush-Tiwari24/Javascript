<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #creator {
        /* height: 200px; */
        width: 200px;
        background-color: bisque;
        display: flex;
        /* justify-content: center; */
        flex-direction: column;
        align-items: center;
      }
      #avatar {
        /* height: 100px; */
        width: 195px;
        background-color: #f1758d43;
        /* border-radius: 20px; */
        padding: 2px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      img {
        height: auto;
        width: 165px;
        border-radius: 5px;
      }
      #stats{
        background-color: rgba(132, 132, 190, 0.481);
        /* height:fit-content; */
        width: 200px;
        display: flex;
        flex-direction: column;
        
        /* justify-content: center; */
        align-items: center;
      }
    </style>
  </head>
  <body style="background-color: #212121">
    0 UNSENT Client has been created. open() not called yet. 1 OPENED open() has
    been called. 2 HEADERS_RECEIVED send() has been called, and headers and
    status are available. 3 LOADING Downloading; responseText holds partial
    data. 4 DONE The operation is complete.
    <br />
    <button id="btn">Create Card</button>
    <!-- <div id="container"></div> -->
    <div id="creator"></div>
  </body>
  <script>
    const requestUrl = "https://api.github.com/users/hiteshchoudhary";
    const xhr = new XMLHttpRequest();
    const btn = document.querySelector("#btn");
    let data;
    xhr.open("GET", requestUrl);
    xhr.onreadystatechange = function () {
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            data = JSON.parse(this.responseText);
            console.log(typeof data);
            console.log(data.followers);
            data.avatar_url;
        }
    };
    xhr.send();
    btn.addEventListener("click", ()=> {
        if (!data) {
        alert("Please wait, data is loading...");
        return;
    }
    btn.remove()
      document.querySelector("#creator").innerHTML = `
        <div id="avatar">
            <img src="${data.avatar_url}" alt="av">
        </div>
        <div id="stats">
            <h3>${data.name}</h3>
            <p>Followers: ${data.followers}</p>
            <p>Repos: ${data.public_repos}</p>
        </div>
    `;
    });
    </script>
</html>
