<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0px;
      }
      body {
        overflow: hidden;
        background: #16222a; /* fallback for old browsers */
        background: -webkit-linear-gradient(
          to right,
          #3a6073,
          #16222a
        ); /* Chrome 10-25, Safari 5.1-6 */
        background: linear-gradient(
          to right,
          #3a6073,
          #16222a
        ); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
      }
      h1 {
        font-family: "Courier New", Courier, monospace;
        color: #282a28fc;
      }
      .container {
        background-image: url(https://imgs.search.brave.com/L-oNwgl9el7clX_YdsH1OnUTUppOkGgOis_DhzTYOFQ/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMTI4/NjY4NTU3OC92ZWN0/b3IvcHJvZHVjdGl2/ZS1tb3JuaW5nLXJv/dXRpbmUtY29sb3It/aWNvbnMtY29sbGVj/dGlvbi5qcGc_cz02/MTJ4NjEyJnc9MCZr/PTIwJmM9bXM1VTdm/RWp3cWZnQmR5bGEt/M3k3dXBfUVptVXNs/OFVHOWRWbnJIM3Y2/cz0);
        min-height: 100vh;
        /* background-position: center; */
        background-repeat: round;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #box {
        font-family: "Playfair Display", serif;
        color: #121212;
        width: 90%;
        padding: 10px;
        max-width: 600px;
        min-height: 25vh;
        max-height: 70vh;
        text-align: center;
        background: rgba(255, 255, 255, 0.178);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.35),
          0 -8px 20px rgba(0, 0, 0, 0.35);
      }
      .entry {
        gap: 12px;
        padding: 20px;
        width: 100%;
        justify-content: space-around;
        display: flex;
      }
      input {
        height: 30px;
        width: 70%;
        background: rgba(251, 239, 239, 0.708);
        /* backdrop-filter: blur(10px); */
        border: 2px solid #16222acd;
        border-radius: 3px;
      }
      input::placeholder {
        font-family: "Courier New", Courier, monospace;
        font-weight: 800;
      }
      .btn-grad,
      .dlt {
        background-image: linear-gradient(
          to right,
          #1d2b64 0%,
          #f8cdda 51%,
          #1d2b64 100%
        );
      }

      .btn-grad,
      .dlt {
        /* margin: 10px; */
        cursor: pointer;
        padding: 1px 15px;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        text-align: center;
        text-transform: uppercase;
        transition: 0.5s;
        background-size: 200% auto;
        color: rgba(0, 0, 0, 0.751);
        box-shadow: 0 0 10px #4f4747;
        border-radius: 10px;
        /* display: block; */
        outline: none;
        border: none;
      }

      .btn-grad:hover,
      .btn-grad:hover,
      .dlt:hover {
        background-position: right center;
        color: #fff;
        text-decoration: none;
      }

      .parent {
        /* padding: 30px; */
        display: flex;
        flex-direction: column;
        /* justify-content: center; */
        align-items: center;
        gap: 8px;
        max-height: 40vh;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #1d2b64 rgba(255, 255, 255, 0.1);
      }
      h4 {
        color: #433f3f;
        font-family: cursive;
      }
      input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: rgb(38, 97, 42);
        cursor: pointer;
        transform: scale(1.2);
      }

      input[type="checkbox"]:hover {
        transform: scale(1.3);
      }
      .task {
        width: 100%;
        max-width: 500px;
        padding: 8px;
        color: #121212b5;
        font-family: "Courier New", Courier, monospace;
        font-weight: 600;
        font-style: oblique;
        box-sizing: border-box;
        overflow-wrap: anywhere;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        border-radius: 5px;
        border: 2px solid white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="box">
        <h1>TO DO LIST</h1>
        <!-- <hr style="box-shadow: 0 2px 4px,0 -2px 4px"> -->
        <br />
        <div class="entry">
          <input type="text" placeholder="Task to do " />

          <button class="btn-grad">ADD</button>
        </div>
        <h4 class="prev">NO TASK YET</h4>

        <div class="parent"></div>
      </div>
    </div>
    <script>
      const Addbtn = document.querySelector(".btn-grad");
      const input = document.querySelector("input");
      const parent = document.querySelector(".parent");
      const empty = document.querySelector(".prev");
      let count = 0;
      Addbtn.addEventListener("click", () => {
        console.log("Button clicked");
        const value = input.value.trim();
        if (!value) return;
        empty.remove();
        parent.innerHTML += `
        <div class="task"><label><input type="checkbox" /> </label>${value}
            <button class="dlt">Delete</button></div>
            `;
        input.value = "";
        count++;
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") Addbtn.click();
      });
      parent.addEventListener("click", (e) => {
          if (e.target.classList.contains("dlt")) {
              e.target.parentElement.remove();
            }
            if (parent.children.length === 0) {
              const h4 = document.createElement("h4");
              h4.className = "prev";
              h4.textContent = "NO TASK YET";
              parent.before(h4);
            }
      });
    </script>
  </body>
</html>
>
